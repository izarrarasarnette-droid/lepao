<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>乐跑 - 个人中心</title>
    <style>
        :root {
            --bg-color: #f7f8fa;
            --text-main: #111111;
            --text-sub: #999999;
            --card-green: #2fb968; /* 原版卡片绿色 */
            --line-color: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 414px;
            height: 100%;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
        }

        /* ================= 页面：我的 ================= */
        .header-area {
            background: #ffffff;
            padding-bottom: 15px;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: 500;
            color: var(--text-main);
        }
        
        .nav-icon svg { width: 22px; height: 22px; fill: #666; }

        .user-profile {
            display: flex;
            align-items: center;
            padding: 5px 20px 20px;
        }

        .avatar {
            width: 65px;
            height: 65px;
            background: #e9ece6;
            border-radius: 50%;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            overflow: hidden;
        }
        
        /* 如果有真实头像链接，替换这里的 src */
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .user-info { margin-left: 15px; flex: 1; }
        
        .user-name {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }
        .user-name svg { width: 14px; height: 14px; fill: #999; margin-left: 5px; }

        .user-id { font-size: 13px; color: var(--text-sub); display: flex; align-items: center; }
        .user-id svg { width: 12px; height: 12px; fill: #999; margin-left: 6px; }

        /* 原版绿色数据卡片 */
        .green-stats-card {
            background: var(--card-green);
            margin: 0 20px;
            border-radius: 12px;
            color: #ffffff;
            padding: 20px 10px;
            box-shadow: 0 4px 10px rgba(47, 185, 104, 0.2);
            position: relative;
        }

        .dotted-line {
            border-top: 3px dotted rgba(255, 255, 255, 0.4);
            margin-bottom: 15px;
            width: 100%;
        }

        .stats-grid { display: flex; text-align: center; }
        
        .stat-item { flex: 1; }
        
        .stat-val { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .stat-val.large { font-size: 24px; }
        .stat-label { font-size: 12px; color: rgba(255, 255, 255, 0.8); }

        /* 认证条 */
        .auth-banner {
            margin: 15px 20px;
            background: #ffffff;
            border-radius: 10px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .auth-left { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; }
        .auth-icon { width: 20px; height: 20px; }
        
        .auth-right { text-align: right; }
        .auth-status { font-size: 13px; color: var(--card-green); margin-bottom: 2px; }
        .auth-number { font-size: 12px; color: var(--text-sub); }

        /* 图标菜单 */
        .service-grid {
            background: #ffffff;
            display: flex;
            padding: 20px 10px;
            margin-bottom: 15px;
        }
        .service-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .service-icon {
            width: 45px;
            height: 45px;
            background: #f0f7f3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .service-icon svg { width: 24px; height: 24px; fill: var(--card-green); }
        .service-label { font-size: 12px; color: var(--text-main); }

        /* 列表菜单 */
        .list-menu { background: #ffffff; padding: 0 20px; }
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 0;
            border-bottom: 1px solid var(--line-color);
            font-size: 15px;
            color: var(--text-main);
        }
        .list-item:last-child { border-bottom: none; }
        .list-left { display: flex; align-items: center; gap: 10px; }
        .list-left svg { width: 20px; height: 20px; fill: var(--card-green); }
        
        .arrow-circle {
            width: 20px;
            height: 20px;
            background: #eaf5ee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .arrow-circle svg { width: 12px; height: 12px; fill: var(--card-green); }

        /* ================= 页面：身份认证 ================= */
        .auth-nav {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: #ffffff;
            border-bottom: 1px solid var(--line-color);
            position: relative;
        }
        .back-btn { font-size: 16px; color: var(--text-main); display: flex; align-items: center; z-index: 10; cursor: pointer; }
        .back-btn svg { width: 18px; height: 18px; margin-right: 4px; }
        .auth-nav-title { position: absolute; left: 0; right: 0; text-align: center; font-size: 17px; font-weight: 500; }

        .role-selector {
            background: #ffffff;
            padding: 30px 20px 40px;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .role-label { font-size: 15px; margin-right: 40px; }
        .role-options { display: flex; gap: 40px; }
        .role-option { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .role-icon { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .role-option.active .role-icon { background: var(--card-green); fill: #fff; }
        .role-option.active .role-text { color: var(--card-green); font-weight: 500; }
        .role-option.inactive .role-icon { border: 1px solid #ddd; fill: #ddd; }
        .role-option.inactive .role-text { color: var(--text-sub); }
        .role-text { font-size: 14px; }

        .info-list { background: #ffffff; padding: 0 20px; }
        .info-item { display: flex; padding: 18px 0; border-bottom: 1px solid var(--line-color); font-size: 15px; }
        .info-item:last-child { border-bottom: none; }
        .info-label { width: 100px; color: var(--text-sub); }
        .info-value { flex: 1; text-align: right; color: var(--text-main); }

        .submit-btn-wrap { padding: 30px 20px; background: #ffffff; height: 100%; }
        .submit-btn { width: 100%; background: #dcdcdc; color: #ffffff; font-size: 16px; padding: 14px 0; border-radius: 6px; border: none; }
    </style>
</head>
<body>

<div id="app">

</div>

<script>
    function switchPage(pageId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }
</script>

</body>
</html>
