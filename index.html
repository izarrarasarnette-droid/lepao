<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="乐跑">
    
    <title>乐跑</title>
    <style>
        :root {
            --app-bg: #ffffff;
            --card-light-green: #dcfadc;
            --stats-dark-green: #446545;
            --text-main: #333333;
            --text-sub: #999999;
            --icon-border: #4a6649;
            --tab-active: #3fb671;
            --tab-inactive: #9aa89a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 414px;
            height: 100%;
            background-color: var(--app-bg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--app-bg);
            display: none;
            flex-direction: column;
            z-index: 1;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ================= 页面1：我的 ================= */
        .page-scroll {
            flex: 1;
            overflow-y: auto;
            /* 底部留出导航栏高度 + 苹果底部小白条的安全距离 */
            padding-bottom: calc(80px + env(safe-area-inset-bottom)); 
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: calc(20px + env(safe-area-inset-top)) 25px 15px;
            font-size: 20px;
            font-weight: 500;
            background: var(--app-bg);
        }

        .gear-icon { width: 24px; height: 24px; fill: #666; }

        .main-green-card {
            background-color: var(--card-light-green);
            border-radius: 25px 25px 0 0;
            margin: 0 15px;
            padding: 25px 20px;
            min-height: calc(100vh - 150px);
        }

        .user-profile {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .avatar-box {
            width: 70px;
            height: 70px;
            background: #e1e3de;
            border-radius: 50%;
            border: 2px solid var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            margin-right: 15px;
        }

        .user-info .name-row {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        .name-row svg { width: 14px; height: 14px; fill: var(--text-main); margin-left: auto; }

        .user-info .id-row {
            font-size: 13px;
            color: #7ba385;
            display: flex;
            align-items: center;
            font-weight: 500;
        }
        .id-row svg { width: 14px; height: 14px; fill: #7ba385; margin-left: 6px; }

        .dotted-line {
            border-top: 4px dotted #213522;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .stats-dark-bar {
            background-color: var(--stats-dark-green);
            border-radius: 6px;
            display: flex;
            padding: 16px 5px;
            color: #ffffff;
            text-align: center;
            margin-bottom: 15px;
            margin-left: -5px;
            margin-right: -5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .stat-item { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .stat-val { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
        .stat-label { font-size: 12px; color: rgba(255, 255, 255, 0.85); }

        .auth-banner {
            background: linear-gradient(108deg, #94ce9a 48%, #72a576 48%);
            border-radius: 6px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
            margin-bottom: 25px;
            margin-left: -5px;
            margin-right: -5px;
            cursor: pointer;
        }

        .auth-left { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500;}
        .auth-icon { width: 20px; height: 20px; stroke: #fff; stroke-width: 2; fill: none;}
        
        .auth-right { text-align: right; }
        .auth-status { font-size: 14px; margin-bottom: 3px; }
        .auth-number { font-size: 12px; opacity: 0.9; }

        .grid-menu { display: flex; justify-content: space-between; margin-bottom: 30px; padding: 0 10px; }
        .grid-item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .grid-icon { width: 50px; height: 50px; background: #caebd0; border: 2px solid var(--icon-border); border-radius: 18px; display: flex; align-items: center; justify-content: center; }
        .grid-icon svg { width: 30px; height: 30px; fill: var(--icon-border); }
        .grid-label { font-size: 13px; color: var(--text-main); font-weight: 500;}

        .thin-line { height: 1px; background: #c0dcc3; margin-bottom: 10px; }

        .list-menu { padding: 0 5px; }
        .list-item { display: flex; align-items: center; justify-content: space-between; padding: 22px 0; }
        .list-left { display: flex; align-items: center; gap: 12px; font-size: 16px; color: var(--text-main); font-weight: 500;}
        .list-left svg { width: 24px; height: 24px; fill: var(--icon-border); }
        .list-arrow { width: 24px; height: 24px; background: #8ec396; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .list-arrow svg { width: 14px; height: 14px; fill: #ffffff; }

        /* 底部导航栏适配苹果小白条 */
        .bottom-tab-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: calc(65px + env(safe-area-inset-bottom));
            background: #ffffff;
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            padding-bottom: env(safe-area-inset-bottom);
            border-top: 1px solid #f0f0f0;
            z-index: 10;
        }

        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--tab-inactive); }
        .tab-item svg { width: 28px; height: 28px; fill: var(--tab-inactive); }
        .tab-item.active { color: var(--tab-active); }
        .tab-item.active svg { fill: var(--tab-active); }
        .tab-label { font-size: 11px; font-weight: 500; }

        /* ================= 页面2：身份认证 ================= */
        .auth-nav-header {
            display: flex;
            align-items: center;
            padding: calc(15px + env(safe-area-inset-top)) 20px 15px;
            background: #ffffff;
            border-bottom: 1px solid #f5f5f5;
            position: relative;
        }

        .back-btn { display: flex; align-items: center; font-size: 20px; color: #666; cursor: pointer; z-index: 10; padding: 5px; margin-left: -5px;}
        .auth-title-center { position: absolute; left: 0; right: 0; text-align: center; font-size: 18px; font-weight: 600; color: #000; top: calc(15px + env(safe-area-inset-top));}

        .role-selector-box { background: #ffffff; padding: 30px 20px 20px; display: flex; align-items: center; }
        .role-label-text { font-size: 16px; color: #333; margin-right: 50px; font-weight: 500;}
        .role-options-flex { display: flex; gap: 40px; }
        .role-btn { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .role-circle { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .role-btn.active .role-circle { background: #00a862; }
        .role-btn.active .role-circle svg { fill: #ffffff; width: 35px; height: 35px;}
        .role-btn.active .role-text-label { color: #00a862; font-weight: 500; }
        .role-btn.inactive .role-circle { border: 1px solid #e0e0e0; background: #ffffff; }
        .role-btn.inactive .role-circle svg { fill: #dcdcdc; width: 35px; height: 35px;}
        .role-btn.inactive .role-text-label { color: #dcdcdc; }

        .details-list-wrap { background: #ffffff; padding: 0 20px; }
        .detail-row { display: flex; padding: 20px 0; border-bottom: 1px solid #f2f2f2; font-size: 15px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-lbl { width: 100px; color: #333; font-weight: 500;}
        .detail-val { flex: 1; text-align: right; color: #999; }

        .bottom-btn-area { padding: 40px 20px; background: #ffffff; height: 100%; }
        .cert-btn { width: 100%; background: #a5a5a5; color: #ffffff; font-size: 17px; font-weight: 500; padding: 15px 0; border-radius: 30px; border: none; }
    </style>
</head>

<script>
    function switchPage(pageId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }
</script>
